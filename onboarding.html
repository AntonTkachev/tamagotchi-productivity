<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose your companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .title {
      font-size: 22px;
      color: #74b9ff;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 12px;
      color: #636e72;
      letter-spacing: 2px;
      margin-bottom: 48px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 140px;
      background: #16213e;
      border: 2px solid #2d3436;
      border-radius: 16px;
      padding: 20px 16px 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card.rabbit:hover  { border-color: #a29bfe; box-shadow: 0 8px 32px rgba(162,155,254,0.3); }
    .card.cat:hover     { border-color: #fdcb6e; box-shadow: 0 8px 32px rgba(253,203,110,0.3); }
    .card.dog:hover     { border-color: #e17055; box-shadow: 0 8px 32px rgba(225,112,85,0.3); }
    .card.parrot:hover  { border-color: #00b894; box-shadow: 0 8px 32px rgba(0,184,148,0.3); }

    .card.selected.rabbit  { border-color: #a29bfe; box-shadow: 0 0 24px rgba(162,155,254,0.5); }
    .card.selected.cat     { border-color: #fdcb6e; box-shadow: 0 0 24px rgba(253,203,110,0.5); }
    .card.selected.dog     { border-color: #e17055; box-shadow: 0 0 24px rgba(225,112,85,0.5); }
    .card.selected.parrot  { border-color: #00b894; box-shadow: 0 0 24px rgba(0,184,148,0.5); }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .pet-name {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .rabbit  .pet-name { color: #a29bfe; }
    .cat     .pet-name { color: #fdcb6e; }
    .dog     .pet-name { color: #e17055; }
    .parrot  .pet-name { color: #00b894; }

    .pet-trait {
      font-size: 10px;
      color: #636e72;
      text-align: center;
      letter-spacing: 1px;
    }

    .confirm-btn {
      margin-top: 40px;
      background: #0984e3;
      color: #fff;
      border: none;
      padding: 12px 40px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s, background 0.15s;
      pointer-events: none;
    }

    .confirm-btn.visible {
      opacity: 1;
      pointer-events: all;
    }

    .confirm-btn:hover { background: #74b9ff; }

    .egg-note {
      margin-top: 16px;
      font-size: 11px;
      color: #444;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="title" data-i18n="onboarding_title">Choose your companion</div>
  <div class="subtitle" data-i18n="onboarding_subtitle">who will hatch from your egg?</div>

  <div class="cards">
    <div class="card rabbit" data-type="rabbit">
      <canvas id="canvas-rabbit" width="100" height="100"></canvas>
      <div class="pet-name" data-i18n="rabbit_name">Bunny</div>
      <div class="pet-trait" data-i18n="rabbit_trait">curious & energetic</div>
    </div>
    <div class="card cat" data-type="cat">
      <canvas id="canvas-cat" width="100" height="100"></canvas>
      <div class="pet-name" data-i18n="cat_name">Kitty</div>
      <div class="pet-trait" data-i18n="cat_trait">independent & clever</div>
    </div>
    <div class="card dog" data-type="dog">
      <canvas id="canvas-dog" width="100" height="100"></canvas>
      <div class="pet-name" data-i18n="dog_name">Buddy</div>
      <div class="pet-trait" data-i18n="dog_trait">loyal & enthusiastic</div>
    </div>
    <div class="card parrot" data-type="parrot">
      <canvas id="canvas-parrot" width="100" height="100"></canvas>
      <div class="pet-name" data-i18n="parrot_name">Poly</div>
      <div class="pet-trait" data-i18n="parrot_trait">creative & chatty</div>
    </div>
  </div>

  <button class="confirm-btn" id="confirmBtn" data-i18n="btn_hatch">Hatch my egg 🥚</button>
  <div class="egg-note" data-i18n="egg_note">your pet starts as an egg — you'll find out who's inside!</div>

  <script src="i18n.js"></script>
  <script src="onboarding.js"></script>
</body>
</html>
